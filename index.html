<!DOCTYPE html>
<html>
<head>
  <title>Totally Normal Site</title>
  <style>
    body {
      margin: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    button {
      padding: 20px 40px;
      font-size: 20px;
      cursor: pointer;
      border-radius: 10px;
    }

    iframe {
      width: 100vw;
      height: 100vh;
      border: none;
    }
  </style>
</head>
<body>

<button id="btn">Click Me 👀</button>

<script>
document.getElementById("btn").onclick = function () {
  document.body.innerHTML = `
    <iframe 
      src="https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1&mute=0"
      allow="autoplay">
    </iframe>
  `;
};
</script>

</body>
</html>
